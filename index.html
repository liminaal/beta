<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>liminaal</title>
    <meta name="description" content="liminaal - eerie and aesthetic music gallery." />
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      /* === Amorphous Drifting Glow — Bottom-Left ⇄ Top-Right (looping) === */
      .liminal-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -9999;
        overflow: hidden;
      }

      .drift-glow {
        position: absolute;
        width: 400px;
        height: 400px;
        bottom: -150px;
        left: -150px;
        opacity: 0.6;
        filter: blur(40px);
        mix-blend-mode: screen;
        animation: drift-br-tr 40s infinite alternate ease-in-out;
        background:
          radial-gradient(circle at 40% 30%, rgba(230, 194, 90, 0.4) 0%, transparent 50%),
          radial-gradient(circle at 70% 60%, rgba(212, 168, 78, 0.35) 0%, transparent 60%),
          radial-gradient(circle at 20% 80%, rgba(240, 214, 140, 0.3) 0%, transparent 70%);
      }

      @keyframes drift-br-tr {
        0% { transform: translate(0, 0); }
        100% { transform: translate(calc(100vw + 200px), calc(-100vh - 200px)); }
      }

      /* === Screensaver === */
      #screensaver {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #1a170b;
        z-index: 9999;
        opacity: 0;
        transition: opacity 1s ease-in-out;
        pointer-events: none;
      }
      #screensaver.show {
        opacity: 1;
        pointer-events: auto;
      }
      #screensaver.hide {
        opacity: 0;
        pointer-events: none;
      }
      #iframe-ss {
        pointer-events: none;
      }

      :root{
        --bg:#1a170b;
        --fg:#f0e6c2;
        --accent:#e6c25a;
        --muted:rgba(240,230,194,0.14);
        --card:#231f12;
        --border:rgba(240,230,194,.08);
        --shadow:0 10px 40px rgba(0,0,0,.45);
        --card-radius:12px;
      }
      *{box-sizing:border-box}
      html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:'Unbounded',sans-serif;position:relative;z-index:1;overflow-x:hidden}
      .container{max-width:1100px;margin:0 auto;padding:80px 20px;position:relative;z-index:2}
      h1{text-align:center;margin:0 0 18px;font-size:3rem;color:var(--fg)}
      .spotify-player{display:flex;justify-content:center;margin:1.5rem 0;position:relative;z-index:3}
      iframe{border-radius:12px}

      .loader {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #1a170b;
        z-index: 99999;
        font-size: 1.25rem;
        letter-spacing: 2px;
        color: var(--fg);
        transition: opacity .6s ease, visibility .6s ease;
      }
      .loader-inner { display:flex; gap:8px; align-items:center; }
      .loader .label { font-weight:700; text-transform:lowercase; }
      .loader .dots { display:inline-block; width:36px; text-align:left; }
      .loader .dots span { display:inline-block; width:6px; height:6px; margin-right:4px; border-radius:50%; background:var(--fg); opacity:.18; transform:translateY(0); animation: dot 1s infinite linear; }
      .loader .dots span:nth-child(1){ animation-delay: 0s }
      .loader .dots span:nth-child(2){ animation-delay: 0.12s }
      .loader .dots span:nth-child(3){ animation-delay: 0.24s }

      @keyframes dot {
        0% { opacity: .18; transform: translateY(0) scale(.9); }
        40% { opacity: 1; transform: translateY(-6px) scale(1.05); }
        80% { opacity: .18; transform: translateY(0) scale(.95); }
      }

      .loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

      .image-placeholder{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-top:2.5rem;position:relative;z-index:3}

      .image-box{
        position:relative;
        height:260px;
        border-radius:var(--card-radius);
        overflow:hidden;
        cursor:pointer;
        box-shadow:var(--shadow);
        border:1px solid var(--border);
        background:var(--card);
        transition:transform .45s cubic-bezier(.2,.9,.2,1),box-shadow .45s;
      }
      .image-box img.thumb{
        width:100%;height:100%;object-fit:cover;display:block;
        transition:transform .8s ease;
      }
      .image-box::before{
        content:"";
        position:absolute;
        inset:0;
        z-index:1;
        pointer-events:none;
        background:
          radial-gradient(ellipse at 30% 20%, rgba(60,50,30,0.08) 0%, transparent 30%),
          linear-gradient(180deg, rgba(0,0,0,0.15) 10%, rgba(0,0,0,0.4) 70%);
        mix-blend-mode:multiply;
      }
      .image-box::after{
        content:"";
        position:absolute;
        inset:0;
        z-index:3;
        pointer-events:none;
        background:
          linear-gradient(to top, rgba(0,0,0,.8), transparent 45%);
        transition:opacity .5s;
      }
      .image-box .meta{
        position:absolute;
        left:0;right:0;bottom:0;
        padding:12px 14px;
        z-index:5;
        display:flex;
        justify-content:space-between;
        align-items:center;
        background:linear-gradient(180deg,rgba(0,0,0,0),rgba(26,23,11,0.75));
        transform:translateY(6px);
        transition:transform .36s;
        color:var(--fg);
      }
      .image-box .meta .title{font-weight:700;font-size:1.02rem}
      .image-box .meta .sub{font-size:.75rem;opacity:.7}
      .image-box:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 20px 60px rgba(0,0,0,.65)}
      .image-box:hover img.thumb{transform:scale(1.06)}
      .image-box:hover .meta{transform:translateY(0)}

      .hover-preview{
        position:fixed;
        pointer-events:none;
        z-index:12000;
        display:flex;
        gap:12px;
        align-items:flex-start;
        transform:translate3d(12px,12px,0) scale(.98);
        transition:opacity .12s linear,transform .12s linear;
        opacity:0;
        visibility:hidden;
        max-width:420px;
        filter:drop-shadow(0 10px 40px rgba(0,0,0,0.7));
      }
      .hover-preview.active{
        opacity:1;
        visibility:visible;
        transform:translate3d(12px,12px,0) scale(1);
      }
      .hover-preview .preview-thumb{
        width:180px;
        height:120px;
        border-radius:10px;
        overflow:hidden;
        background:#1a170b;
        flex-shrink:0;
      }
      .hover-preview .preview-thumb img{
        width:100%;
        height:100%;
        object-fit:cover;
        display:block;
      }
      .hover-preview .preview-meta{
        background:linear-gradient(180deg,rgba(26,23,11,0.85),rgba(18,16,8,0.95));
        padding:10px;
        border-radius:8px;
        color:var(--fg);
        max-width:220px;
      }
      .hover-preview .preview-meta h4{margin:0 0 6px;font-size:1rem}
      .hover-preview .preview-meta p{margin:0;font-size:.85rem;color:rgba(240,230,194,.9);opacity:.95}

      .popup{
        position:fixed;
        inset:0;
        background:rgba(26,23,11,.96);
        display:flex;
        justify-content:center;
        align-items:center;
        opacity:0;
        pointer-events:none;
        transition:opacity .3s;
        z-index:10000;
      }
      .popup.active{opacity:1;pointer-events:auto}
      .popup-inner{
        max-width:900px;
        width:calc(100% - 40px);
        margin:20px;
        border-radius:14px;
        overflow:hidden;
        box-shadow:0 20px 80px rgba(0,0,0,.8);
        transform:translateY(10px);
        transition:transform .24s;
      }
      .popup.active .popup-inner{transform:translateY(0)}
      .popup-content{
        background:linear-gradient(180deg,rgba(30,27,12,.97),rgba(18,16,8,.99));
        padding:18px;
        text-align:center;
        color:var(--fg);
      }
      .popup-content img{
        width:100%;
        height:auto;
        max-height:70vh;
        object-fit:contain;
      }
      .popup-close{
        position:absolute;
        top:20px;
        right:25px;
        width:50px;
        height:50px;
        border:none;
        border-radius:50%;
        background:rgba(255,255,255,.08);
        color:var(--fg);
        font-size:2rem;
        cursor:pointer;
        transition:.3s ease;
      }
      .popup-close:hover{
        background:rgba(230,194,90,.2);
        color:var(--accent);
        transform:rotate(90deg);
      }

      .collab-wrap{margin-top:4rem;position:relative;z-index:3}
      .collab-head{display:flex;justify-content:center;align-items:center;gap:12px;margin:28px 0 8px}
      .collab-head h2{margin:0;font-size:1.6rem}
      .collaborators{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
      .collaborator{
        width:160px;
        background:linear-gradient(180deg, rgba(240,230,194,0.03), rgba(240,230,194,0.01));
        border-radius:12px;
        padding:12px;
        display:flex;
        flex-direction:column;
        align-items:center;
        cursor:pointer;
        box-shadow:0 8px 30px rgba(0,0,0,0.5);
        transition:transform .28s ease,box-shadow .28s ease,opacity .28s;
        opacity:0;
        transform:translateY(8px) scale(.98);
      }
      .collaborator.visible{opacity:1;transform:translateY(0) scale(1)}
      .collaborator:hover{
        transform:translateY(-6px) scale(1.04);
        box-shadow:0 20px 50px rgba(0,0,0,0.7);
      }
      .collaborator img{
        width:100px;
        height:100px;
        object-fit:cover;
        border-radius:6px;
        margin-bottom:5px;
        border:0;
        background:transparent;
      }
      .collaborator .name{font-weight:700;font-size:1rem;margin-bottom:4px;color:var(--fg)}
      .collaborator .role{font-size:.78rem;opacity:.7;color:var(--fg)}

      .popup-collab{
        position:fixed;
        inset:0;
        background:rgba(26,23,11,.92);
        display:flex;
        justify-content:center;
        align-items:center;
        opacity:0;
        pointer-events:none;
        transition:opacity .3s;
        z-index:10001;
      }
      .popup-collab.active{opacity:1;pointer-events:auto}
      .popup-collab .popup-inner{
        max-width:920px;
        width:calc(100% - 40px);
        margin:20px;
        border-radius:14px;
        overflow:hidden;
        box-shadow:0 20px 80px rgba(0,0,0,.8);
        transform:translateY(10px);
        transition:transform .24s;
        background:linear-gradient(180deg,rgba(30,27,12,.97),rgba(18,16,8,.99));
        display:flex;
        gap:0;
      }
      .popup-collab.active .popup-inner{transform:translateY(0)}
      .popup-collab .collab-left{
        flex: 0 0 50%;
        min-width:220px;
        max-height:70vh;
        overflow:hidden;
        display:flex;
        align-items:center;
        justify-content:center;
        background:transparent;
      }
      .popup-collab .collab-left img{
        width:100%;
        height:100%;
        object-fit:cover;
        display:block;
        background:transparent;
      }
      .popup-collab .collab-right{
        flex:1;
        padding:20px 22px;
        color:var(--fg);
        display:flex;
        flex-direction:column;
        justify-content:center;
        gap:8px;
      }
      .popup-collab .collab-right h3{margin:0;font-size:1.4rem}
      .popup-collab .collab-right p{margin:0;opacity:.92;line-height:1.45}
      .popup-collab .popup-close{
        position:absolute;
        top:18px;
        right:20px;
        background:rgba(240,230,194,.04);
        border:none;
        color:var(--fg);
        padding:8px 10px;
        border-radius:8px;
        cursor:pointer;
        z-index:10002;
      }

      @media (max-width:900px){
        .popup-collab .popup-inner{flex-direction:column}
        .popup-collab .collab-left{flex-basis:auto;height:45vw;max-height:55vh}
      }
      @media (max-width:700px){
        h1{font-size:2rem}
        .image-box{height:200px}
        .hover-preview{display:none}
        .collaborators{gap:.6rem}
        .collaborator{width:46%;min-width:140px}
      }

      body::before,
      body::after,
      .container::before,
      .container::after {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <!-- Amorphous drifting glow -->
    <div class="liminal-bg">
      <div class="drift-glow"></div>
    </div>
    
    <!-- Loader -->
    <div class="loader" id="siteLoader" role="status" aria-hidden="false">
      <div class="loader-inner">
        <div class="label">liminaalizing</div>
        <div class="dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
    
    <div class="container" id="siteContent" aria-hidden="true">
      <div id="screensaver" class="hide">
        <iframe id="iframe-ss" src="/assets/screensaver" width="100%" height="100%" frameborder="0"></iframe>
      </div>
      
      <h1>liminaal</h1>
      
      <div class="spotify-player">
        <iframe src="https://open.spotify.com/embed/playlist/5xzeVvVZU6mCfSwALg1yNp?utm_source=generator" width="100%" height="152" frameborder="0" allowfullscreen allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
      
      <!-- GALLERY (dynamic) -->
      <div class="image-placeholder" id="gallery-container">
        <div style="padding:40px;text-align:center;width:100%;">loading gallery...</div>
      </div>
      
      <!-- Collaborators Section -->
      <div class="collab-wrap">
        <div class="collab-head"><h2>Collaborators</h2></div>
        <div class="collaborators" id="collaborators">
          <div class="collaborator" data-coll-img="/assets/mii/Kaido head.png" data-coll-img-full="/assets/mii/Kaido full.png" data-coll-desc="Kaido — a young boy that likes photographing &amp; coding.<br>he started when he was 11 y/o creating a Minecraft bot, then started taking ambiental photos when he was 13.">
            <img src="/assets/mii/Kaido head.png" alt="Kaido" />
            <div class="name">Kaido</div>
            <div class="role"></div>
          </div>
          <div class="collaborator" data-coll-img="/assets/mii/Awitax head.png" data-coll-img-full="/assets/mii/Awitax full.png" data-coll-desc="Awitax — a young girl that loves drawing &amp; gaming.">
            <img src="/assets/mii/Awitax head.png" alt="Awitax" />
            <div class="name">Awitax</div>
            <div class="role"></div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- hover preview element -->
    <div class="hover-preview" id="hoverPreview" aria-hidden="true">
      <div class="preview-thumb"><img id="previewThumb" src="" alt="" /></div>
      <div class="preview-meta">
        <h4 id="previewTitle"></h4>
        <p id="previewDesc"></p>
      </div>
    </div>
    
    <!-- Popup Modal (gallery) -->
    <div class="popup" id="popup" aria-hidden="true">
      <div class="popup-inner" role="dialog" aria-modal="true" aria-labelledby="popup-title">
        <button class="popup-close" id="popup-close" aria-label="Close">×</button>
        <div class="popup-content">
          <div class="imgwrap"><img src="" alt="Popup Image" id="popup-img" /></div>
          <h3 id="popup-title"></h3>
          <p id="popup-desc"></p>
        </div>
      </div>
    </div>
    
    <!-- Collaborator Popup -->
    <div class="popup-collab" id="popup-collab" aria-hidden="true">
      <div class="popup-inner" role="dialog" aria-modal="true" aria-labelledby="popup-collab-title">
        <button class="popup-close" id="popup-collab-close" aria-label="Close">×</button>
        <div class="collab-left"><img id="popup-collab-img" src="" alt="Collaborator image" /></div>
        <div class="collab-right">
          <h3 id="popup-collab-title"></h3>
          <p id="popup-collab-desc"></p>
        </div>
      </div>
    </div>
    
    <footer style="text-align:center;padding:2rem 0;color:rgba(240,230,194,.6)">© liminaal</footer>

    <script>
      /* =========================
         CONFIG
      ========================= */
      const CONFIG = {
        USER: 'liminaal',
        REPO: 'liminaal.github.io',
        FOLDER: 'assets/images',
        CACHE_TTL: 24 * 60 * 60 * 1000
      };

      /* =========================
         CACHE
      ========================= */
      const cache = {
        get(key){
          try{
            const item = localStorage.getItem(`liminaal:${key}`);
            if(!item) return null;
            const parsed = JSON.parse(item);
            if(Date.now() - parsed.timestamp > CONFIG.CACHE_TTL){
              localStorage.removeItem(`liminaal:${key}`);
              return null;
            }
            return parsed.data;
          }catch{ return null; }
        },
        set(key,data){
          try{
            localStorage.setItem(`liminaal:${key}`, JSON.stringify({ data, timestamp:Date.now() }));
          }catch(err){ console.warn(err); }
        }
      };

      /* =========================
         LAZY LOADER
      ========================= */
      class LazyImageLoader{
        constructor(){
          this.observer = null;
          this.init();
        }
        init(){
          if('IntersectionObserver' in window){
            this.observer = new IntersectionObserver(entries => {
              entries.forEach(entry => {
                if(entry.isIntersecting){
                  this.load(entry.target);
                  this.observer.unobserve(entry.target);
                }
              });
            }, { rootMargin:'100px' });
          }
        }
        load(img){
          const src = img.dataset.src;
          if(!src) return;
          const preload = new Image();
          preload.onload = () => { img.src = src; };
          preload.src = src;
          img.removeAttribute('data-src');
        }
        observe(img){
          if(this.observer){ this.observer.observe(img); }
          else{ this.load(img); }
        }
      }
      const lazyLoader = new LazyImageLoader();

      /* =========================
         POPUP / LIGHTBOX
      ========================= */
      const popup = document.getElementById('popup');
      const popupImg = document.getElementById('popup-img');
      const popupTitle = document.getElementById('popup-title');
      const popupDesc = document.getElementById('popup-desc');
      const popupClose = document.getElementById('popup-close');

      function openPopup(src, title, desc){
        popupImg.src = src;
        popupTitle.textContent = title || '';
        popupDesc.textContent = desc || '';
        popup.classList.add('active');
        popup.setAttribute('aria-hidden','false');
        document.body.style.overflow = 'hidden';
      }
      function closePopup(){
        popup.classList.remove('active');
        popup.setAttribute('aria-hidden','true');
        popupImg.src = '';
        document.body.style.overflow = '';
      }
      popupClose.addEventListener('click', closePopup);
      popup.addEventListener('click', e => { if(e.target === popup) closePopup(); });
      document.addEventListener('keydown', e => { if(e.key === 'Escape' && popup.classList.contains('active')) closePopup(); });

      /* =========================
         HOVER PREVIEW
      ========================= */
      const hoverPreview = document.getElementById('hoverPreview');
      const previewThumb = document.getElementById('previewThumb');
      const previewTitle = document.getElementById('previewTitle');
      const previewDesc = document.getElementById('previewDesc');

      function positionPreview(x, y){
        const pad = 12;
        const rect = hoverPreview.getBoundingClientRect();
        let left = x + 18, top = y + 18;
        if(left + rect.width + pad > window.innerWidth) left = x - rect.width - 18;
        if(top + rect.height + pad > window.innerHeight) top = y - rect.height - 18;
        hoverPreview.style.transform = `translate3d(${left}px, ${top}px, 0) scale(1)`;
      }

      function highResPath(path){
        if(!path) return path;
        const parts = path.split('.');
        if(parts.length < 2) return path;
        const ext = parts.pop();
        const base = parts.join('.');
        return base + '@2x.' + ext;
      }

      /* =========================
         LOAD GALLERY (GitHub API)
      ========================= */
      async function loadGallery(){
        const container = document.getElementById('gallery-container');
        const cacheKey = `gallery:${CONFIG.FOLDER}`;

        try{
          let files = cache.get(cacheKey);
          if(!files){
            const response = await fetch(`https://api.github.com/repos/${CONFIG.USER}/${CONFIG.REPO}/contents/${CONFIG.FOLDER}`);
            if(!response.ok) throw new Error(`HTTP ${response.status}`);
            files = await response.json();
            cache.set(cacheKey, files);
          }

          const images = files
            .filter(file => file.type === 'file' && /\.(png|jpg|jpeg|webp|gif|svg)$/i.test(file.name))
            .sort((a,b) => {
              const na = parseInt(a.name), nb = parseInt(b.name);
              if(!isNaN(na) && !isNaN(nb)) return na - nb;
              return a.name.localeCompare(b.name, undefined, { numeric:true });
            });

          renderGallery(container, images);

        }catch(err){
          console.warn('Gallery load error:', err);
          container.innerHTML = `<div style="padding:40px;text-align:center;color:var(--accent)">failed loading gallery</div>`;
        }
      }

      /* =========================
         RENDER GALLERY
      ========================= */
      function renderGallery(container, images){
        container.innerHTML = '';
        const fragment = document.createDocumentFragment();

        images.forEach((file, index) => {
          const imageURL = `https://raw.githubusercontent.com/${CONFIG.USER}/${CONFIG.REPO}/main/${CONFIG.FOLDER}/${file.name}`;
          const title = file.name.replace(/\.[^/.]+$/, '').replace(/[_-]/g, ' ');
          const sub = `#${index + 1}`;

          const box = document.createElement('div');
          box.className = 'image-box';
          box.dataset.title = title;
          box.dataset.desc = '';
          box.dataset.img = imageURL;

          const img = document.createElement('img');
          img.className = 'thumb';
          img.alt = file.name;
          img.loading = 'lazy';
          img.decoding = 'async';
          img.dataset.src = imageURL;

          const meta = document.createElement('div');
          meta.className = 'meta';
          meta.innerHTML = `<div class="title">${title}</div><div class="sub">${sub}</div>`;

          box.appendChild(img);
          box.appendChild(meta);
          fragment.appendChild(box);

          // Lazy load
          lazyLoader.observe(img);

          // Hover preview
          let showTimer = null;
          box.addEventListener('mouseenter', e => {
            showTimer = setTimeout(() => {
              const candidate = highResPath(imageURL);
              previewThumb.src = candidate;
              previewThumb.onerror = () => { previewThumb.onerror = null; previewThumb.src = imageURL; };
              previewTitle.textContent = title;
              previewDesc.textContent = '';
              hoverPreview.classList.add('active');
              hoverPreview.setAttribute('aria-hidden','false');
              positionPreview(e.clientX, e.clientY);
            }, 110);
          });
          box.addEventListener('mousemove', e => {
            if(hoverPreview.classList.contains('active')) positionPreview(e.clientX, e.clientY);
          });
          box.addEventListener('mouseleave', () => {
            clearTimeout(showTimer);
            hoverPreview.classList.remove('active');
            hoverPreview.setAttribute('aria-hidden','true');
          });

          // Click to open popup
          box.addEventListener('click', () => {
            const candidate = highResPath(imageURL);
            popupImg.src = candidate;
            popupImg.onerror = () => { popupImg.onerror = null; popupImg.src = imageURL; };
            openPopup(candidate, title, '');
          });
        });

        container.appendChild(fragment);
      }

      /* =========================
         COLLABORATORS
      ========================= */
      const collaborators = document.querySelectorAll('.collaborator');
      const popupCollab = document.getElementById('popup-collab');
      const popupCollabImg = document.getElementById('popup-collab-img');
      const popupCollabTitle = document.getElementById('popup-collab-title');
      const popupCollabDesc = document.getElementById('popup-collab-desc');
      const popupCollabClose = document.getElementById('popup-collab-close');

      collaborators.forEach((coll, idx) => {
        setTimeout(() => coll.classList.add('visible'), 80 * idx + 120);
      });

      collaborators.forEach(coll => {
        coll.addEventListener('click', () => {
          const chosen = coll.getAttribute('data-coll-img-full') || coll.dataset.collImgFull || coll.getAttribute('data-coll-img') || coll.querySelector('img')?.src || '';
          const candidate = highResPath(chosen);
          popupCollabImg.src = candidate;
          popupCollabImg.onerror = () => { popupCollabImg.onerror = null; popupCollabImg.src = chosen; };
          const name = coll.querySelector('.name')?.textContent || '';
          const desc = (coll.getAttribute('data-coll-desc') || coll.dataset.collDesc || '').replace(/\n/g, '<br>');
          popupCollabTitle.textContent = name;
          popupCollabDesc.innerHTML = desc;
          popupCollab.classList.add('active');
          popupCollab.setAttribute('aria-hidden','false');
          document.body.style.overflow = 'hidden';
        });
      });

      function closeCollabPopup(){
        popupCollab.classList.remove('active');
        popupCollab.setAttribute('aria-hidden','true');
        popupCollabImg.src = '';
        document.body.style.overflow = '';
      }
      popupCollabClose.addEventListener('click', closeCollabPopup);
      popupCollab.addEventListener('click', e => { if(e.target === popupCollab) closeCollabPopup(); });
      document.addEventListener('keydown', e => { if(e.key === 'Escape' && popupCollab.classList.contains('active')) closeCollabPopup(); });

      /* =========================
         TOUCH DETECTION
      ========================= */
      function isTouch(){
        return ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
      }
      if(isTouch()){
        hoverPreview.style.display = 'none';
      }

      /* =========================
         INIT
      ========================= */
      document.addEventListener('DOMContentLoaded', () => {
        const loader = document.getElementById('siteLoader');
        const siteContent = document.getElementById('siteContent');

        function hideLoader(){
          loader.classList.add('hidden');
          loader.setAttribute('aria-hidden','true');
          siteContent.setAttribute('aria-hidden','false');
        }
        if(document.readyState === 'complete'){
          setTimeout(hideLoader, 120);
        }else{
          window.addEventListener('load', () => setTimeout(hideLoader, 160));
        }

        // Load gallery
        loadGallery();
      });
    </script>
    
    <!-- Screensaver idle timer -->
    <script>
      (function(){
        let idleTimer;
        const SCREENSAVER_DELAY = 5 * 60 * 1000;
        const screensaver = document.getElementById('screensaver');

        function showScreensaver(){
          screensaver.classList.remove('hide');
          screensaver.classList.add('show');
        }
        function hideScreensaver(){
          screensaver.classList.remove('show');
          screensaver.classList.add('hide');
        }
        function resetTimer(){
          clearTimeout(idleTimer);
          hideScreensaver();
          idleTimer = setTimeout(showScreensaver, SCREENSAVER_DELAY);
        }
        ['mousemove','mousedown','touchstart','keydown','scroll'].forEach(ev => {
          document.addEventListener(ev, resetTimer, {passive:true});
        });
        resetTimer();
      })();
    </script>
  </body>
</html>
