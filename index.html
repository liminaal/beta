<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<title>liminaal</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#1a170b;
  --fg:#f0e6c2;
  --card-radius:14px;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  min-height:100%;
  background:var(--bg);
  color:var(--fg);
  font-family:'Unbounded',sans-serif;
}

/* =========================
   BACKGROUND GLOW
========================= */

.liminal-bg{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:-1;
  pointer-events:none;
}

.drift-glow{
  position:absolute;
  width:450px;
  height:450px;
  bottom:-180px;
  left:-180px;
  filter:blur(60px);
  opacity:.65;

  background:
    radial-gradient(circle at 40% 30%, rgba(230,194,90,.45), transparent 50%),
    radial-gradient(circle at 70% 60%, rgba(212,168,78,.3), transparent 60%),
    radial-gradient(circle at 20% 80%, rgba(240,214,140,.25), transparent 70%);

  animation:drift 40s infinite alternate ease-in-out;
}

@keyframes drift{
  from{
    transform:translate(0,0);
  }
  to{
    transform:translate(calc(100vw + 200px), calc(-100vh - 200px));
  }
}

/* =========================
   LAYOUT
========================= */

.container{
  max-width:1200px;
  margin:auto;
  padding:70px 20px;
}

h1{
  text-align:center;
  margin:0 0 25px;
  font-size:3rem;
}

.spotify-player{
  margin:0 auto 40px;
  max-width:900px;
}

.spotify-player iframe{
  width:100%;
  border:none;
  border-radius:14px;
}

/* =========================
   GALLERY
========================= */

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:18px;
}

.image-box{
  position:relative;
  overflow:hidden;
  border-radius:var(--card-radius);
  cursor:pointer;

  background:#241f12;

  box-shadow:
    0 10px 30px rgba(0,0,0,.45);

  transition:
    transform .35s ease,
    box-shadow .35s ease;
}

.image-box:hover{
  transform:translateY(-5px) scale(1.02);
  box-shadow:
    0 20px 50px rgba(0,0,0,.6);
}

.image-box img{
  width:100%;
  height:320px;
  object-fit:cover;
  display:block;

  transition:transform .5s ease;
}

.image-box:hover img{
  transform:scale(1.06);
}

.meta{
  position:absolute;
  left:0;
  right:0;
  bottom:0;

  padding:14px;

  background:linear-gradient(
    to top,
    rgba(0,0,0,.82),
    transparent
  );

  color:var(--fg);
}

.meta .title{
  font-size:1rem;
  font-weight:700;
}

.meta .sub{
  font-size:.78rem;
  opacity:.7;
  margin-top:4px;
}

/* =========================
   LIGHTBOX
========================= */

.lightbox{
  position:fixed;
  inset:0;

  display:none;
  justify-content:center;
  align-items:center;

  background:rgba(0,0,0,.96);

  z-index:99999;
}

.lightbox.active{
  display:flex;
}

.lightbox img{
  max-width:92vw;
  max-height:92vh;

  border-radius:12px;

  box-shadow:
    0 20px 60px rgba(0,0,0,.8);
}

.lightbox-close{
  position:absolute;
  top:20px;
  right:30px;

  width:50px;
  height:50px;

  border:none;
  border-radius:50%;

  background:rgba(255,255,255,.06);

  color:var(--fg);

  font-size:2rem;
  cursor:pointer;

  transition:.3s;
}

.lightbox-close:hover{
  transform:rotate(90deg);
  background:rgba(230,194,90,.2);
  color:#e6c25a;
}

/* =========================
   LOADER
========================= */

.loader{
  position:fixed;
  inset:0;

  display:flex;
  justify-content:center;
  align-items:center;

  background:#1a170b;

  z-index:999999;

  transition:opacity .5s ease;
}

.loader.hidden{
  opacity:0;
  pointer-events:none;
}

.loader-inner{
  display:flex;
  align-items:center;
  gap:10px;
}

.loader .dots span{
  display:inline-block;

  width:7px;
  height:7px;

  margin-right:4px;

  border-radius:50%;
  background:var(--fg);

  animation:dot 1s infinite;
}

.loader .dots span:nth-child(2){
  animation-delay:.15s;
}

.loader .dots span:nth-child(3){
  animation-delay:.3s;
}

@keyframes dot{
  0%,100%{
    opacity:.2;
    transform:translateY(0);
  }
  50%{
    opacity:1;
    transform:translateY(-6px);
  }
}

/* =========================
   FOOTER
========================= */

footer{
  text-align:center;
  padding:50px 20px;
  opacity:.6;
  font-size:.9rem;
}

@media(max-width:700px){

  h1{
    font-size:2.1rem;
  }

  .image-box img{
    height:240px;
  }

  .lightbox-close{
    top:15px;
    right:15px;
  }

}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="liminal-bg">
  <div class="drift-glow"></div>
</div>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-inner">
    <div>liminaalizing</div>

    <div class="dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">

  <button class="lightbox-close" id="lightboxClose">
    ×
  </button>

  <img id="lightboxImg" src="" alt="">

</div>

<!-- CONTENT -->
<div class="container">

  <h1>liminaal</h1>

  <div class="spotify-player">
    <iframe
      src="https://open.spotify.com/embed/playlist/5xzeVvVZU6mCfSwALg1yNp?utm_source=generator"
      height="152"
      allowfullscreen
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy">
    </iframe>
  </div>

  <!-- GALLERY -->
  <div class="gallery" id="gallery"></div>

</div>

<footer>
  © liminaal
</footer>

<script>
/* =========================
   CONFIG
========================= */

const CONFIG = {

  // folder path inside repo
  IMAGE_PATH: '/assets/images/original/',

  // image names
  // 1.jpg, 2.jpg, 3.jpg etc
  IMAGE_COUNT: 50,

  // supported extension
  EXTENSION: 'jpg'

};

/* =========================
   ELEMENTS
========================= */

const gallery = document.getElementById('gallery');

const loader = document.getElementById('loader');

const lightbox = document.getElementById('lightbox');

const lightboxImg = document.getElementById('lightboxImg');

const lightboxClose = document.getElementById('lightboxClose');

/* =========================
   LOAD GALLERY
========================= */

function loadGallery(){

  gallery.innerHTML = '';

  for(let i = 1; i <= CONFIG.IMAGE_COUNT; i++){

    const imagePath =
      `${CONFIG.IMAGE_PATH}${i}.${CONFIG.EXTENSION}`;

    const imageBox = document.createElement('div');

    imageBox.className = 'image-box';

    imageBox.innerHTML = `

      <img
        src="${imagePath}"
        alt="Artwork ${i}"
        loading="lazy"
      >

      <div class="meta">
        <div class="title">
          artwork ${i}
        </div>

        <div class="sub">
          #${i}
        </div>
      </div>

    `;

    imageBox.addEventListener('click', () => {
      openLightbox(imagePath);
    });

    gallery.appendChild(imageBox);
  }

}

/* =========================
   LIGHTBOX
========================= */

function openLightbox(src){

  lightboxImg.src = src;

  lightbox.classList.add('active');

  document.body.style.overflow = 'hidden';

}

function closeLightbox(){

  lightbox.classList.remove('active');

  document.body.style.overflow = '';

  setTimeout(() => {
    lightboxImg.src = '';
  }, 200);

}

lightboxClose.addEventListener('click', closeLightbox);

lightbox.addEventListener('click', e => {

  if(e.target === lightbox){
    closeLightbox();
  }

});

document.addEventListener('keydown', e => {

  if(e.key === 'Escape'){
    closeLightbox();
  }

});

/* =========================
   INIT
========================= */

window.addEventListener('load', () => {

  loadGallery();

  setTimeout(() => {
    loader.classList.add('hidden');
  }, 300);

});
</script>

</body>
</html>
