<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>liminaal</title>
    <meta name="description" content="liminaal - eerie and aesthetic music gallery." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #000E20;
        --bg-elevated: #0a1628;
        --fg: #C8B3F6;
        --fg-muted: rgba(200, 179, 246, 0.6);
        --accent: #7546E8;
        --accent-soft: rgba(117, 70, 232, 0.15);
        --accent-glow: rgba(117, 70, 232, 0.3);
        --card: rgba(45, 28, 127, 0.4);
        --card-hover: rgba(45, 28, 127, 0.6);
        --border: rgba(200, 179, 246, 0.1);
        --border-hover: rgba(117, 70, 232, 0.4);
        --shadow-sm: 0 4px 16px rgba(0, 14, 32, 0.5);
        --shadow-md: 0 12px 40px rgba(0, 14, 32, 0.6);
        --shadow-lg: 0 24px 80px rgba(0, 14, 32, 0.8);
        --radius-sm: 8px;
        --radius-md: 14px;
        --radius-lg: 20px;
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 300;
        line-height: 1.6;
        overflow-x: hidden;
        position: relative;
      }

      /* === Atmospheric Background === */
      .atmosphere {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .atmosphere::before {
        content: '';
        position: absolute;
        inset: 0;
        background: 
          radial-gradient(ellipse 80% 60% at 20% 80%, rgba(201, 165, 90, 0.08) 0%, transparent 50%),
          radial-gradient(ellipse 60% 50% at 80% 20%, rgba(180, 140, 70, 0.06) 0%, transparent 50%),
          radial-gradient(ellipse 100% 80% at 50% 50%, rgba(14, 12, 8, 0.4) 0%, transparent 70%);
        animation: atmosphere-shift 30s ease-in-out infinite alternate;
      }

      .atmosphere::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        opacity: 0.4;
        mix-blend-mode: overlay;
      }

      @keyframes atmosphere-shift {
        0% { transform: scale(1) translate(0, 0); opacity: 1; }
        100% { transform: scale(1.1) translate(-2%, -1%); opacity: 0.8; }
      }

      /* === Floating Orbs === */
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.4;
        mix-blend-mode: screen;
        animation: orb-float 40s ease-in-out infinite;
      }

      .orb-1 {
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(201, 165, 90, 0.3) 0%, transparent 70%);
        bottom: -200px;
        left: -150px;
        animation-delay: 0s;
      }

      .orb-2 {
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(180, 140, 70, 0.25) 0%, transparent 70%);
        top: -100px;
        right: -100px;
        animation-delay: -20s;
        animation-duration: 50s;
      }

      .orb-3 {
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(220, 180, 100, 0.2) 0%, transparent 70%);
        top: 50%;
        left: 50%;
        animation-delay: -10s;
        animation-duration: 35s;
      }

      @keyframes orb-float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25% { transform: translate(50px, -30px) scale(1.05); }
        50% { transform: translate(-30px, 50px) scale(0.95); }
        75% { transform: translate(-50px, -20px) scale(1.02); }
      }

      /* === Loader === */
      .loader {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: var(--bg);
        z-index: 99999;
        transition: opacity 0.8s var(--ease-out), visibility 0.8s var(--ease-out);
      }

      .loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loader-content {
        text-align: center;
      }

      .loader-text {
        font-family: 'Unbounded', sans-serif;
        font-size: 1.1rem;
        font-weight: 300;
        letter-spacing: 0.15em;
        color: var(--fg);
        margin-bottom: 1.5rem;
        opacity: 0.8;
      }

      .loader-bar {
        width: 200px;
        height: 2px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
        margin: 0 auto;
      }

      .loader-bar::after {
        content: '';
        display: block;
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        animation: loader-slide 1.5s var(--ease-in-out) infinite;
      }

      @keyframes loader-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }

      /* === Container === */
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px;
        position: relative;
        z-index: 1;
      }

      /* === Header === */
      .header {
        padding: 120px 0 60px;
        text-align: center;
        position: relative;
      }

      .header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 1px;
        height: 80px;
        background: linear-gradient(to bottom, transparent, var(--accent-soft), transparent);
      }

      .logo {
        font-family: 'Unbounded', sans-serif;
        font-size: clamp(2.5rem, 6vw, 4rem);
        font-weight: 300;
        letter-spacing: -0.02em;
        color: var(--fg);
        margin-bottom: 1rem;
        position: relative;
        display: inline-block;
      }

      .logo::after {
        content: '';
        position: absolute;
        bottom: -8px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
      }

      .tagline {
        font-size: 0.95rem;
        color: var(--fg-muted);
        letter-spacing: 0.08em;
        font-weight: 300;
        margin-top: 1.5rem;
      }

      /* === Spotify Player === */
      .player-wrap {
        max-width: 700px;
        margin: 3rem auto;
        padding: 0 20px;
      }

      .player-wrap iframe {
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-md);
      }

      /* === Section Titles === */
      .section-title {
        font-family: 'Unbounded', sans-serif;
        font-size: 1.4rem;
        font-weight: 400;
        text-align: center;
        margin: 4rem 0 2.5rem;
        color: var(--fg);
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
      }

      .section-title::before,
      .section-title::after {
        content: '';
        flex: 1;
        max-width: 100px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border), transparent);
      }

      /* === Gallery === */
      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        padding: 0 0 4rem;
      }

      .gallery-item {
        position: relative;
        aspect-ratio: 4/5;
        border-radius: var(--radius-md);
        overflow: hidden;
        cursor: pointer;
        background: var(--card);
        border: 1px solid var(--border);
        transition: all 0.5s var(--ease-out);
        transform: translateY(0);
      }

      .gallery-item:hover {
        transform: translateY(-8px);
        border-color: var(--border-hover);
        box-shadow: var(--shadow-lg);
      }

      .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.8s var(--ease-out), filter 0.5s;
        filter: brightness(0.85) saturate(0.9);
      }

      .gallery-item:hover img {
        transform: scale(1.08);
        filter: brightness(1) saturate(1);
      }

      .gallery-item::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(14, 12, 8, 0.95) 0%,
          rgba(14, 12, 8, 0.4) 40%,
          transparent 70%
        );
        z-index: 1;
        transition: opacity 0.4s;
      }

      .gallery-item:hover::before {
        opacity: 0.7;
      }

      .gallery-item .meta {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px;
        z-index: 2;
        transform: translateY(10px);
        transition: transform 0.5s var(--ease-out);
      }

      .gallery-item:hover .meta {
        transform: translateY(0);
      }

      .gallery-item .title {
        font-family: 'Unbounded', sans-serif;
        font-size: 0.95rem;
        font-weight: 400;
        color: var(--fg);
        margin-bottom: 4px;
        letter-spacing: 0.01em;
      }

      .gallery-item .index {
        font-size: 0.75rem;
        color: var(--accent);
        font-weight: 400;
        letter-spacing: 0.1em;
        opacity: 0.8;
      }

      .gallery-item .view-icon {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(14, 12, 8, 0.6);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2;
        opacity: 0;
        transform: scale(0.8);
        transition: all 0.4s var(--ease-out);
      }

      .gallery-item:hover .view-icon {
        opacity: 1;
        transform: scale(1);
      }

      .view-icon svg {
        width: 16px;
        height: 16px;
        stroke: var(--fg);
        fill: none;
        stroke-width: 2;
      }

      /* === Loading State === */
      .gallery-loading {
        grid-column: 1 / -1;
        text-align: center;
        padding: 4rem 0;
        color: var(--fg-muted);
        font-size: 0.9rem;
        letter-spacing: 0.05em;
      }

      /* === Collaborators === */
      .collaborators {
        display: flex;
        flex-wrap: wrap;
        gap: 24px;
        justify-content: center;
        padding: 0 0 4rem;
      }

      .collaborator {
        width: 180px;
        padding: 24px 16px;
        background: var(--card);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        text-align: center;
        cursor: pointer;
        transition: all 0.5s var(--ease-out);
        opacity: 0;
        transform: translateY(20px);
      }

      .collaborator.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .collaborator:hover {
        transform: translateY(-6px);
        background: var(--card-hover);
        border-color: var(--border-hover);
        box-shadow: var(--shadow-md);
      }

      .collaborator img {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 12px;
        border: 2px solid var(--border);
        transition: border-color 0.4s;
      }

      .collaborator:hover img {
        border-color: var(--accent-soft);
      }

      .collaborator .name {
        font-family: 'Unbounded', sans-serif;
        font-size: 0.95rem;
        font-weight: 400;
        color: var(--fg);
        margin-bottom: 4px;
      }

      .collaborator .role {
        font-size: 0.78rem;
        color: var(--fg-muted);
        letter-spacing: 0.03em;
      }

      /* === Popup / Modal === */
      .popup {
        position: fixed;
        inset: 0;
        background: rgba(14, 12, 8, 0.92);
        backdrop-filter: blur(20px);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s var(--ease-out);
        z-index: 10000;
        padding: 20px;
      }

      .popup.active {
        opacity: 1;
        pointer-events: auto;
      }

      .popup-inner {
        max-width: 900px;
        width: 100%;
        max-height: 90vh;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-lg);
        transform: scale(0.95) translateY(20px);
        transition: transform 0.5s var(--ease-out);
        position: relative;
      }

      .popup.active .popup-inner {
        transform: scale(1) translateY(0);
      }

      .popup-content {
        padding: 32px;
        text-align: center;
        overflow-y: auto;
        max-height: 90vh;
      }

      .popup-content img {
        width: 100%;
        max-height: 60vh;
        object-fit: contain;
        border-radius: var(--radius-sm);
        margin-bottom: 24px;
      }

      .popup-content h3 {
        font-family: 'Unbounded', sans-serif;
        font-size: 1.3rem;
        font-weight: 400;
        color: var(--fg);
        margin-bottom: 8px;
      }

      .popup-content p {
        color: var(--fg-muted);
        font-size: 0.9rem;
        line-height: 1.6;
      }

      .popup-close {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 40px;
        height: 40px;
        border: 1px solid var(--border);
        border-radius: 50%;
        background: rgba(14, 12, 8, 0.6);
        backdrop-filter: blur(10px);
        color: var(--fg);
        font-size: 1.2rem;
        cursor: pointer;
        transition: all 0.3s var(--ease-out);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }

      .popup-close:hover {
        background: var(--accent-soft);
        border-color: var(--accent);
        color: var(--accent);
        transform: rotate(90deg);
      }

      /* === Collaborator Popup === */
      .popup-collab .popup-inner {
        display: flex;
        flex-direction: row;
        max-width: 800px;
      }

      .popup-collab .collab-left {
        flex: 0 0 45%;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .popup-collab .collab-left img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .popup-collab .collab-right {
        flex: 1;
        padding: 40px 32px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: left;
      }

      .popup-collab .collab-right h3 {
        font-family: 'Unbounded', sans-serif;
        font-size: 1.5rem;
        font-weight: 400;
        margin-bottom: 16px;
        color: var(--fg);
      }

      .popup-collab .collab-right p {
        color: var(--fg-muted);
        line-height: 1.7;
        font-size: 0.92rem;
      }

      /* === Hover Preview === */
      .hover-preview {
        position: fixed;
        pointer-events: none;
        z-index: 12000;
        display: flex;
        gap: 14px;
        align-items: flex-start;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s, visibility 0.2s;
        max-width: 380px;
        filter: drop-shadow(0 20px 60px rgba(0, 0, 0, 0.8));
      }

      .hover-preview.active {
        opacity: 1;
        visibility: visible;
      }

      .hover-preview .preview-thumb {
        width: 160px;
        height: 110px;
        border-radius: var(--radius-sm);
        overflow: hidden;
        background: var(--bg-elevated);
        flex-shrink: 0;
        border: 1px solid var(--border);
      }

      .hover-preview .preview-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .hover-preview .preview-meta {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        padding: 12px 14px;
        border-radius: var(--radius-sm);
        color: var(--fg);
        max-width: 200px;
      }

      .hover-preview .preview-meta h4 {
        font-family: 'Unbounded', sans-serif;
        font-size: 0.9rem;
        font-weight: 400;
        margin: 0 0 4px;
      }

      .hover-preview .preview-meta p {
        font-size: 0.8rem;
        color: var(--fg-muted);
        margin: 0;
      }

      /* === Footer === */
      .footer {
        text-align: center;
        padding: 3rem 0;
        color: var(--fg-muted);
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        border-top: 1px solid var(--border);
        margin-top: 2rem;
      }

      /* === Screensaver === */
      #screensaver {
        position: fixed;
        inset: 0;
        background: var(--bg);
        z-index: 9999;
        opacity: 0;
        transition: opacity 1s var(--ease-out);
        pointer-events: none;
      }

      #screensaver.show {
        opacity: 1;
        pointer-events: auto;
      }

      #screensaver.hide {
        opacity: 0;
        pointer-events: none;
      }

      #iframe-ss {
        pointer-events: none;
      }

      /* === Responsive === */
      @media (max-width: 768px) {
        .header {
          padding: 80px 0 40px;
        }

        .gallery {
          grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
          gap: 12px;
        }

        .gallery-item {
          aspect-ratio: 3/4;
        }

        .gallery-item .meta {
          padding: 14px;
        }

        .gallery-item .title {
          font-size: 0.85rem;
        }

        .hover-preview {
          display: none;
        }

        .collaborators {
          gap: 16px;
        }

        .collaborator {
          width: calc(50% - 8px);
          min-width: 140px;
        }

        .popup-collab .popup-inner {
          flex-direction: column;
        }

        .popup-collab .collab-left {
          flex: 0 0 auto;
          height: 200px;
        }

        .popup-collab .collab-right {
          padding: 24px 20px;
        }

        .section-title {
          font-size: 1.2rem;
          margin: 3rem 0 2rem;
        }
      }

      @media (max-width: 480px) {
        .gallery {
          grid-template-columns: repeat(2, 1fr);
        }

        .collaborator {
          width: 100%;
          max-width: 200px;
        }
      }

      /* === Accessibility === */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* === Focus States === */
      button:focus-visible,
      .gallery-item:focus-visible,
      .collaborator:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <!-- Atmospheric Background -->
    <div class="atmosphere">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <!-- Loader -->
    <div class="loader" id="siteLoader" role="status" aria-label="Loading">
      <div class="loader-content">
        <div class="loader-text">liminaal</div>
        <div class="loader-bar"></div>
      </div>
    </div>

    <div class="container" id="siteContent">
      <!-- Screensaver -->
      <div id="screensaver" class="hide">
        <iframe id="iframe-ss" src="/assets/screensaver" width="100%" height="100%" frameborder="0"></iframe>
      </div>

      <!-- Header -->
      <header class="header">
        <h1 class="logo">liminaal</h1>
        <p class="tagline">eerie & aesthetic music gallery</p>
      </header>

      <!-- Spotify Player -->
      <div class="player-wrap">
        <iframe 
          src="https://open.spotify.com/embed/playlist/5xzeVvVZU6mCfSwALg1yNp?utm_source=generator" 
          width="100%" 
          height="152" 
          frameborder="0" 
          allowfullscreen 
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
          loading="lazy">
        </iframe>
      </div>

      <!-- Gallery Section -->
      <h2 class="section-title">Gallery</h2>
      <div class="gallery" id="gallery-container">
        <div class="gallery-loading">loading gallery...</div>
      </div>

      <!-- Collaborators Section -->
      <h2 class="section-title">Collaborators</h2>
      <div class="collaborators" id="collaborators">
        <div class="collaborator" 
             data-coll-img="/assets/mii/Kaido head.png" 
             data-coll-img-full="/assets/mii/Kaido full.png" 
             data-coll-desc="11 | Built a bot that wandered an empty Minecraft world
13 | Captured the quiet hum of liminal thresholds
15 | Navigates abandoned concrete. Leaves marks in the dust.

Code in one hand. Camera in the other.
Building in the static. Documenting the in-between.">
          <img src="/assets/mii/Kaido head.png" alt="Kaido" />
          <div class="name">Kaido</div>
          <div class="role"></div>
        </div>
        <div class="collaborator" 
             data-coll-img="/assets/mii/Awitax head.png" 
             data-coll-img-full="/assets/mii/Awitax full.png" 
             data-coll-desc="Awitax — a young girl that loves drawing &amp; gaming.">
          <img src="/assets/mii/Awitax head.png" alt="Awitax" />
          <div class="name">Awitax</div>
          <div class="role"></div>
        </div>
      </div>
    </div>

    <!-- Hover Preview -->
    <div class="hover-preview" id="hoverPreview" aria-hidden="true">
      <div class="preview-thumb"><img id="previewThumb" src="" alt="" /></div>
      <div class="preview-meta">
        <h4 id="previewTitle"></h4>
        <p id="previewDesc"></p>
      </div>
    </div>

    <!-- Gallery Popup -->
    <div class="popup" id="popup" aria-hidden="true">
      <div class="popup-inner" role="dialog" aria-modal="true" aria-labelledby="popup-title">
        <button class="popup-close" id="popup-close" aria-label="Close">×</button>
        <div class="popup-content">
          <img src="" alt="Popup Image" id="popup-img" />
          <h3 id="popup-title"></h3>
          <p id="popup-desc"></p>
        </div>
      </div>
    </div>

    <!-- Collaborator Popup -->
    <div class="popup popup-collab" id="popup-collab" aria-hidden="true">
      <div class="popup-inner" role="dialog" aria-modal="true" aria-labelledby="popup-collab-title">
        <button class="popup-close" id="popup-collab-close" aria-label="Close">×</button>
        <div class="collab-left"><img id="popup-collab-img" src="" alt="Collaborator image" /></div>
        <div class="collab-right">
          <h3 id="popup-collab-title"></h3>
          <p id="popup-collab-desc"></p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>© liminaal</p>
    </footer>

    <script>
      /* =========================
         CONFIG
      ========================= */
      const CONFIG = {
        USER: 'liminaal',
        REPO: 'liminaal.github.io',
        FOLDER: 'assets/images',
        CACHE_TTL: 24 * 60 * 60 * 1000
      };

      /* =========================
         CACHE
      ========================= */
      const cache = {
        get(key) {
          try {
            const item = localStorage.getItem(`liminaal:${key}`);
            if (!item) return null;
            const parsed = JSON.parse(item);
            if (Date.now() - parsed.timestamp > CONFIG.CACHE_TTL) {
              localStorage.removeItem(`liminaal:${key}`);
              return null;
            }
            return parsed.data;
          } catch { return null; }
        },
        set(key, data) {
          try {
            localStorage.setItem(`liminaal:${key}`, JSON.stringify({ data, timestamp: Date.now() }));
          } catch (err) { console.warn(err); }
        }
      };

      /* =========================
         LAZY LOADER
      ========================= */
      class LazyImageLoader {
        constructor() {
          this.observer = null;
          this.init();
        }
        init() {
          if ('IntersectionObserver' in window) {
            this.observer = new IntersectionObserver(entries => {
              entries.forEach(entry => {
                if (entry.isIntersecting) {
                  this.load(entry.target);
                  this.observer.unobserve(entry.target);
                }
              });
            }, { rootMargin: '200px' });
          }
        }
        load(img) {
          const src = img.dataset.src;
          if (!src) return;
          const preload = new Image();
          preload.onload = () => { 
            img.src = src;
            img.style.opacity = '1';
          };
          preload.src = src;
          img.removeAttribute('data-src');
        }
        observe(img) {
          if (this.observer) { this.observer.observe(img); }
          else { this.load(img); }
        }
      }
      const lazyLoader = new LazyImageLoader();

      /* =========================
         POPUP / LIGHTBOX
      ========================= */
      const popup = document.getElementById('popup');
      const popupImg = document.getElementById('popup-img');
      const popupTitle = document.getElementById('popup-title');
      const popupDesc = document.getElementById('popup-desc');
      const popupClose = document.getElementById('popup-close');

      function openPopup(src, title, desc) {
        popupImg.src = src;
        popupTitle.textContent = title || '';
        popupDesc.textContent = desc || '';
        popup.classList.add('active');
        popup.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      }

      function closePopup() {
        popup.classList.remove('active');
        popup.setAttribute('aria-hidden', 'true');
        popupImg.src = '';
        document.body.style.overflow = '';
      }

      popupClose.addEventListener('click', closePopup);
      popup.addEventListener('click', e => { if (e.target === popup) closePopup(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape' && popup.classList.contains('active')) closePopup(); });

      /* =========================
         HOVER PREVIEW
      ========================= */
      const hoverPreview = document.getElementById('hoverPreview');
      const previewThumb = document.getElementById('previewThumb');
      const previewTitle = document.getElementById('previewTitle');
      const previewDesc = document.getElementById('previewDesc');

      function positionPreview(x, y) {
        const pad = 16;
        const rect = hoverPreview.getBoundingClientRect();
        let left = x + 20, top = y + 20;
        if (left + rect.width + pad > window.innerWidth) left = x - rect.width - 20;
        if (top + rect.height + pad > window.innerHeight) top = y - rect.height - 20;
        hoverPreview.style.left = `${left}px`;
        hoverPreview.style.top = `${top}px`;
      }

      function highResPath(path) {
        if (!path) return path;
        const parts = path.split('.');
        if (parts.length < 2) return path;
        const ext = parts.pop();
        const base = parts.join('.');
        return base + '@2x.' + ext;
      }

      /* =========================
         LOAD GALLERY
      ========================= */
      async function loadGallery() {
        const container = document.getElementById('gallery-container');
        const cacheKey = `gallery:${CONFIG.FOLDER}`;

        try {
          let files = cache.get(cacheKey);
          if (!files) {
            const response = await fetch(`https://api.github.com/repos/${CONFIG.USER}/${CONFIG.REPO}/contents/${CONFIG.FOLDER}`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            files = await response.json();
            cache.set(cacheKey, files);
          }

          const images = files
            .filter(file => file.type === 'file' && /\.(png|jpg|jpeg|webp|gif|svg)$/i.test(file.name))
            .sort((a, b) => {
              const na = parseInt(a.name), nb = parseInt(b.name);
              if (!isNaN(na) && !isNaN(nb)) return na - nb;
              return a.name.localeCompare(b.name, undefined, { numeric: true });
            });

          renderGallery(container, images);
        } catch (err) {
          console.warn('Gallery load error:', err);
          container.innerHTML = `<div class="gallery-loading" style="color:var(--accent)">failed loading gallery</div>`;
        }
      }

      /* =========================
         RENDER GALLERY
      ========================= */
      function renderGallery(container, images) {
        container.innerHTML = '';
        const fragment = document.createDocumentFragment();

        images.forEach((file, index) => {
          const imageURL = `https://raw.githubusercontent.com/${CONFIG.USER}/${CONFIG.REPO}/main/${CONFIG.FOLDER}/${file.name}`;
          const title = file.name.replace(/\.[^/.]+$/, '').replace(/[_-]/g, ' ');
          const sub = `#${String(index + 1).padStart(2, '0')}`;

          const box = document.createElement('div');
          box.className = 'gallery-item';
          box.tabIndex = 0;
          box.dataset.title = title;
          box.dataset.desc = '';
          box.dataset.img = imageURL;

          const img = document.createElement('img');
          img.alt = file.name;
          img.loading = 'lazy';
          img.decoding = 'async';
          img.dataset.src = imageURL;
          img.style.opacity = '0';
          img.style.transition = 'opacity 0.6s ease';

          const viewIcon = document.createElement('div');
          viewIcon.className = 'view-icon';
          viewIcon.innerHTML = `<svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>`;

          const meta = document.createElement('div');
          meta.className = 'meta';
          meta.innerHTML = `<div class="title">${title}</div><div class="index">${sub}</div>`;

          box.appendChild(img);
          box.appendChild(viewIcon);
          box.appendChild(meta);
          fragment.appendChild(box);

          lazyLoader.observe(img);

          // Hover preview
          let showTimer = null;
          box.addEventListener('mouseenter', e => {
            showTimer = setTimeout(() => {
              const candidate = highResPath(imageURL);
              previewThumb.src = candidate;
              previewThumb.onerror = () => { previewThumb.onerror = null; previewThumb.src = imageURL; };
              previewTitle.textContent = title;
              previewDesc.textContent = '';
              hoverPreview.classList.add('active');
              hoverPreview.setAttribute('aria-hidden', 'false');
              positionPreview(e.clientX, e.clientY);
            }, 150);
          });

          box.addEventListener('mousemove', e => {
            if (hoverPreview.classList.contains('active')) positionPreview(e.clientX, e.clientY);
          });

          box.addEventListener('mouseleave', () => {
            clearTimeout(showTimer);
            hoverPreview.classList.remove('active');
            hoverPreview.setAttribute('aria-hidden', 'true');
          });

          // Click to open popup
          box.addEventListener('click', () => {
            const candidate = highResPath(imageURL);
            popupImg.src = candidate;
            popupImg.onerror = () => { popupImg.onerror = null; popupImg.src = imageURL; };
            openPopup(candidate, title, '');
          });

          // Keyboard support
          box.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              box.click();
            }
          });
        });

        container.appendChild(fragment);
      }

      /* =========================
         COLLABORATORS
      ========================= */
      const collaborators = document.querySelectorAll('.collaborator');
      const popupCollab = document.getElementById('popup-collab');
      const popupCollabImg = document.getElementById('popup-collab-img');
      const popupCollabTitle = document.getElementById('popup-collab-title');
      const popupCollabDesc = document.getElementById('popup-collab-desc');
      const popupCollabClose = document.getElementById('popup-collab-close');

      // Animate in
      const collabObserver = new IntersectionObserver(entries => {
        entries.forEach((entry, idx) => {
          if (entry.isIntersecting) {
            setTimeout(() => entry.target.classList.add('visible'), idx * 100);
            collabObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.2 });

      collaborators.forEach(coll => collabObserver.observe(coll));

      collaborators.forEach(coll => {
        coll.tabIndex = 0;
        coll.addEventListener('click', () => {
          const chosen = coll.getAttribute('data-coll-img-full') || coll.dataset.collImgFull || coll.getAttribute('data-coll-img') || coll.querySelector('img')?.src || '';
          const candidate = highResPath(chosen);
          popupCollabImg.src = candidate;
          popupCollabImg.onerror = () => { popupCollabImg.onerror = null; popupCollabImg.src = chosen; };
          const name = coll.querySelector('.name')?.textContent || '';
          const desc = (coll.getAttribute('data-coll-desc') || coll.dataset.collDesc || '').replace(/\n/g, '<br>');
          popupCollabTitle.textContent = name;
          popupCollabDesc.innerHTML = desc;
          popupCollab.classList.add('active');
          popupCollab.setAttribute('aria-hidden', 'false');
          document.body.style.overflow = 'hidden';
        });

        coll.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            coll.click();
          }
        });
      });

      function closeCollabPopup() {
        popupCollab.classList.remove('active');
        popupCollab.setAttribute('aria-hidden', 'true');
        popupCollabImg.src = '';
        document.body.style.overflow = '';
      }

      popupCollabClose.addEventListener('click', closeCollabPopup);
      popupCollab.addEventListener('click', e => { if (e.target === popupCollab) closeCollabPopup(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape' && popupCollab.classList.contains('active')) closeCollabPopup(); });

      /* =========================
         TOUCH DETECTION
      ========================= */
      function isTouch() {
        return ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
      }
      if (isTouch()) {
        hoverPreview.style.display = 'none';
      }

      /* =========================
         INIT
      ========================= */
      document.addEventListener('DOMContentLoaded', () => {
        const loader = document.getElementById('siteLoader');
        const siteContent = document.getElementById('siteContent');

        function hideLoader() {
          loader.classList.add('hidden');
          loader.setAttribute('aria-hidden', 'true');
        }

        if (document.readyState === 'complete') {
          setTimeout(hideLoader, 200);
        } else {
          window.addEventListener('load', () => setTimeout(hideLoader, 300));
        }

        loadGallery();
      });
    </script>

    <!-- Screensaver idle timer -->
    <script>
      (function() {
        let idleTimer;
        const SCREENSAVER_DELAY = 5 * 60 * 1000;
        const screensaver = document.getElementById('screensaver');

        function showScreensaver() {
          screensaver.classList.remove('hide');
          screensaver.classList.add('show');
        }

        function hideScreensaver() {
          screensaver.classList.remove('show');
          screensaver.classList.add('hide');
        }

        function resetTimer() {
          clearTimeout(idleTimer);
          hideScreensaver();
          idleTimer = setTimeout(showScreensaver, SCREENSAVER_DELAY);
        }

        ['mousemove', 'mousedown', 'touchstart', 'keydown', 'scroll'].forEach(ev => {
          document.addEventListener(ev, resetTimer, { passive: true });
        });

        resetTimer();
      })();
    </script>
  </body>
</html>
