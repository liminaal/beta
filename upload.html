<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Upload - liminaal</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #050505;
      color: #f5f5f5;
      font-family: 'Unbounded', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      width: 100%;
      max-width: 420px;
      padding: 32px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(20,20,20,.97), rgba(8,8,8,.9));
      box-shadow: 0 20px 80px rgba(0,0,0,.8);
    }
    h1 {
      margin: 0 0 20px;
      text-align: center;
    }
    input[type="file"] {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 14px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,.06);
      color: #f5f5f5;
      font-family: inherit;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 14px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,.06);
      color: #f5f5f5;
      font-family: inherit;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #f5f5f5;
      color: #050505;
      font-family: inherit;
      font-weight: 700;
    }
    button:disabled {
      background: rgba(245,245,245,.3);
      cursor: not-allowed;
    }
    .back {
      margin-top: 14px;
      text-align: center;
      font-size: .85rem;
      opacity: .75;
    }
    a {
      color: #f5f5f5;
      text-decoration: none;
    }
    #status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: 500;
    }
    .success {
      background: rgba(34,197,94,.2);
      color: #86efac;
    }
    .error {
      background: rgba(239,68,68,.2);
      color: #fca5a5;
    }
    .uploading {
      background: rgba(99,102,241,.2);
      color: #c7d2fe;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Upload Image</h1>
    <form id="uploadForm">
      <input type="file" id="imageFile" accept="image/*" required>
      <input type="text" id="title" placeholder="Title (optional)" maxlength="100">
      <input type="text" id="desc" placeholder="Description (optional)" maxlength="200">
      <button type="submit" id="uploadBtn">Upload</button>
    </form>
    <div class="back">
      <a href="./">← back to liminaal</a>
    </div>
    <div id="status"></div>
  </div>

  <!-- Scripts ORDEN OBLIGATORIO -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
document.addEventListener('DOMContentLoaded', async () => {
  const form = document.getElementById('uploadForm');
  const statusDiv = document.getElementById('status');
  const uploadBtn = document.getElementById('uploadBtn');

  // Check auth on load
  const { data: userData, error: userErr } = await supabase.auth.getUser();
  const user = userData?.user || null;

  if (userErr || !user) {
    statusDiv.textContent = 'Please login first.';
    statusDiv.className = 'error';
    form.style.display = 'none';
    return;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const file = document.getElementById('imageFile').files[0];
    const title = document.getElementById('title').value.trim();
    const desc  = document.getElementById('desc').value.trim();

    if (!file) {
      showStatus('Select an image', 'error');
      return;
    }

    uploadBtn.disabled = true;
    uploadBtn.textContent = 'Uploading...';
    showStatus('Uploading image...', 'uploading');

    try {
      // 1. Upload to Storage
      const fileExt = file.name.split('.').pop();
      const fileName = `${Date.now()}.${fileExt}`;

      const { error: uploadError } = await supabase.storage
        .from('images')
        .upload(fileName, file);

      if (uploadError) throw uploadError;

      // 2. Get public URL
      const { data: pub } = supabase.storage
        .from('images')
        .getPublicUrl(fileName);

      const publicUrl = pub?.publicUrl;
      if (!publicUrl) {
        throw new Error('No public URL returned from storage');
      }

      // 3. Insert into images table (siempre pending para cumplir RLS)
      const { error: insertError } = await supabase
        .from('images')
        .insert({
          url: publicUrl,
          uploaded_by: user.id,
          status: 'pending',
          ...(title && { title }),
          ...(desc && { description: desc })
        });

      if (insertError) throw insertError;

      showStatus(
        'Image uploaded as pending. Waiting for moderator approval.',
        'success'
      );

      form.reset();
    } catch (error) {
      showStatus('Error: ' + (error.message || String(error)), 'error');
    } finally {
      uploadBtn.disabled = false;
      uploadBtn.textContent = 'Upload';
    }
  });

  function showStatus(message, type) {
    statusDiv.textContent = message;
    statusDiv.className = type;
  }
});
</script>
</body>
</html>
